<div class="flex min-h-screen bg-slate-50/50">
  <!-- Sidebar -->
  <app-sidebar (collapsedChange)="onSidebarCollapsed($event)"></app-sidebar>

  <!-- Contenu principal : marge gauche qui suit la largeur de la sidebar -->
  <div
    class="flex-1 flex flex-col min-w-0 transition-all duration-300 ease-in-out"
    [style.margin-left]="sidebarCollapsed() ? '72px' : '280px'"
  >
    <!-- Topbar (inclut la bannière de simulation + header) -->
    <app-authenticated-topbar (toggleSidebar)="onSidebarCollapsed(!sidebarCollapsed())"></app-authenticated-topbar>

    <main class="flex-1 overflow-auto p-4 lg:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Toasts globaux -->
<app-toast></app-toast>
