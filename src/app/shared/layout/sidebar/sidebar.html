<div
  class="fixed inset-y-0 left-0 z-40 w-72 overflow-y-auto border-r border-slate-200 bg-white transition-transform duration-300 ease-in-out md:static md:translate-x-0"
  [class.-translate-x-full]="collapsed"
  [class.translate-x-0]="!collapsed"
>
  <div class="flex items-center justify-between px-5 py-4 border-b border-slate-200">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Menu</p>
      <h2 class="mt-1 text-xl font-semibold text-slate-900">Application</h2>
    </div>
    <button
      type="button"
      class="md:hidden rounded-lg p-2 text-slate-600 hover:bg-slate-100"
      aria-label="Fermer le menu"
      (click)="onToggle()"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <nav class="px-2 py-4 space-y-1">
    <a
      *ngFor="let item of filteredNavItems"
      [routerLink]="item.path"
      routerLinkActive="bg-blue-50 text-blue-700"
      [routerLinkActiveOptions]="{ exact: true }"
      class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 transition"
      (click)="onToggle()"
    >
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-100 text-slate-600 group-hover:bg-blue-50 group-hover:text-blue-600">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
        </svg>
      </span>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="mt-auto border-t border-slate-200 px-4 py-4">
    <div class="text-xs uppercase tracking-[0.2em] text-slate-400">Connecté en tant que</div>
    <div class="mt-3 text-sm font-semibold text-slate-900">{{ currentUser?.first_name || currentUser?.email }}</div>
    <div class="text-xs text-slate-500">{{ currentUser?.role }}</div>
  </div>
</div>
<div *ngIf="!collapsed" class="fixed inset-0 z-30 bg-black/20 md:hidden" (click)="onToggle()"></div>
