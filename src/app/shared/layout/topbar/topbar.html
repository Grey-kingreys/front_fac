<nav class="bg-white border-b border-gray-200 sticky top-0 z-50 backdrop-blur-lg bg-opacity-90">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Brand -->
    <a routerLink="/" class="flex items-center gap-3 hover:opacity-80 transition-opacity duration-200 cursor-pointer">
      <img src="/dj.png" alt="DjoulaGest Logo" class="w-10 h-10 object-contain transform hover:scale-105 transition-transform duration-200">
      <span class="text-lg font-bold tracking-tight">
        Djoula<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-500">Gest</span>
      </span>
    </a>

    <!-- Desktop Navigation Links -->
    <div class="hidden md:flex items-center gap-1">
      <a href="#features" class="text-sm font-medium text-gray-600 px-4 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-all duration-200 hover:scale-105">Fonctionnalités</a>
      <a href="#pricing" class="text-sm font-medium text-gray-600 px-4 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-all duration-200 hover:scale-105">Tarifs</a>
      <a routerLink="/dashboard" class="text-sm font-medium text-gray-600 px-4 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-all duration-200 hover:scale-105">Tableau de bord</a>
    </div>

    <!-- Desktop CTA Buttons -->
    <div class="hidden md:flex items-center gap-3">
      @if (isLoggedIn()) {
        <a routerLink="/dashboard" class="bg-gradient-to-r from-blue-600 to-emerald-500 text-white text-sm font-semibold px-5 py-2.5 rounded-lg hover:from-blue-700 hover:to-emerald-600 transition-all duration-200 hover:scale-105 shadow-lg hover:shadow-xl flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Mon espace
        </a>
      } @else {
        <a routerLink="/login" class="text-sm font-semibold text-blue-600 px-5 py-2.5 rounded-lg border-2 border-blue-600 hover:bg-blue-50 transition-all duration-200 hover:scale-105">Se connecter</a>
        <a routerLink="/login" class="bg-gradient-to-r from-blue-600 to-emerald-500 text-white text-sm font-semibold px-5 py-2.5 rounded-lg hover:from-blue-700 hover:to-emerald-600 transition-all duration-200 hover:scale-105 shadow-lg hover:shadow-xl">Commencer</a>
      }
    </div>

    <!-- Mobile menu button -->
    <button 
      (click)="toggleMobileMenu()" 
      class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors"
      [attr.aria-expanded]="isMobileMenuOpen"
      aria-label="Toggle mobile menu">
      <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div 
    *ngIf="isMobileMenuOpen"
    class="md:hidden absolute top-16 left-0 right-0 bg-white border-b border-gray-200 shadow-lg"
    [@slideDown]>
    
    <div class="px-6 py-4 space-y-2">
      <!-- Mobile Navigation Links -->
      <a 
        href="#features" 
        (click)="closeMobileMenu()"
        class="block text-sm font-medium text-gray-600 px-4 py-3 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-colors">
        Fonctionnalités
      </a>
      <a 
        href="#pricing" 
        (click)="closeMobileMenu()"
        class="block text-sm font-medium text-gray-600 px-4 py-3 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-colors">
        Tarifs
      </a>
      <a 
        routerLink="/dashboard" 
        (click)="closeMobileMenu()"
        class="block text-sm font-medium text-gray-600 px-4 py-3 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-colors">
        Tableau de bord
      </a>
      
      <!-- Mobile CTA Buttons -->
      <div class="pt-4 border-t border-gray-200 space-y-2">
        @if (isLoggedIn()) {
          <a routerLink="/dashboard" (click)="closeMobileMenu()"
            class="block w-full bg-gradient-to-r from-blue-600 to-emerald-500 text-white text-sm font-semibold px-5 py-3 rounded-lg hover:from-blue-700 hover:to-emerald-600 transition-all duration-200 text-center shadow-lg">
            Mon espace
          </a>
        } @else {
          <a routerLink="/login" (click)="closeMobileMenu()"
            class="block w-full text-sm font-semibold text-blue-600 px-5 py-3 rounded-lg border-2 border-blue-600 hover:bg-blue-50 transition-colors text-center">
            Se connecter
          </a>
          <a routerLink="/login" (click)="closeMobileMenu()"
            class="block w-full bg-gradient-to-r from-blue-600 to-emerald-500 text-white text-sm font-semibold px-5 py-3 rounded-lg hover:from-blue-700 hover:to-emerald-600 transition-all duration-200 text-center shadow-lg">
            Commencer
          </a>
        }
      </div>
    </div>
  </div>
</nav>
