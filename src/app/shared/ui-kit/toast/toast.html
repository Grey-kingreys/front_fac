<div class="fixed bottom-5 right-5 z-[200] flex flex-col gap-2 pointer-events-none">
  @for (toast of toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg border pointer-events-auto w-80 bg-white"
      [ngClass]="{
        'border-emerald-200': toast.type === 'success',
        'border-red-200':     toast.type === 'error',
        'border-amber-200':   toast.type === 'warning',
        'border-blue-200':    toast.type === 'info'
      }"
    >
      <!-- Icône -->
      @if (toast.type === 'success') {
        <svg class="w-5 h-5 text-emerald-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      } @else if (toast.type === 'error') {
        <svg class="w-5 h-5 text-red-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      } @else if (toast.type === 'warning') {
        <svg class="w-5 h-5 text-amber-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      } @else {
        <svg class="w-5 h-5 text-blue-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01"/></svg>
      }

      <!-- Message -->
      <p class="text-sm font-medium flex-1 text-gray-800 leading-snug">{{ toast.message }}</p>

      <!-- Fermer -->
      <button
        type="button"
        (click)="dismiss(toast.id)"
        class="shrink-0 text-gray-400 hover:text-gray-600 transition-colors mt-0.5"
        aria-label="Fermer"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  }
</div>
